<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - RealAgent</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --primary: #3b82f6;
      --text: #1f2937;
      --text-secondary: #6b7280;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.15);
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --card: #2a2a2a;
        --primary: #ffffff;
        --text: #ffffff;
        --text-secondary: #b3b3b3;
      }
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .offline-container {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px;
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    
    .offline-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
      opacity: 0.6;
    }
    
    .offline-icon svg {
      width: 100%;
      height: 100%;
      stroke: var(--text-secondary);
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      color: var(--text);
    }
    
    p {
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 30px;
    }
    
    .retry-btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.2s ease;
      font-family: inherit;
    }
    
    .retry-btn:hover {
      opacity: 0.9;
    }
    
    .cached-content {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid #e5e7eb;
    }
    
    .cached-item {
      display: flex;
      align-items: center;
      padding: 12px;
      margin: 8px 0;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.2s ease;
    }
    
    .cached-item:hover {
      background: rgba(59, 130, 246, 0.15);
    }
    
    .cached-item svg {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      stroke: var(--primary);
    }
    
    @media (max-width: 480px) {
      .offline-container {
        padding: 30px 20px;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      .offline-icon {
        width: 60px;
        height: 60px;
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
        <path d="M8.5 8.5L15.5 15.5"/>
        <path d="M15.5 8.5L8.5 15.5"/>
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    <p>
      It looks like you're not connected to the internet. Don't worry - you can still browse 
      properties you've visited before. They're saved on your device for offline viewing.
    </p>
    
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
    
    <div class="cached-content" id="cached-content">
      <h3 style="margin-bottom: 20px; color: var(--text-secondary);">Recently Viewed Properties</h3>
      <div id="cached-listings"></div>
    </div>
  </div>

  <script>
    // Load cached listings from service worker
    async function loadCachedListings() {
      if ('serviceWorker' in navigator && 'caches' in window) {
        try {
          const cacheNames = await caches.keys();
          const dynamicCache = cacheNames.find(name => name.includes('dynamic'));
          
          if (dynamicCache) {
            const cache = await caches.open(dynamicCache);
            const requests = await cache.keys();
            
            const listingRequests = requests.filter(req => 
              req.url.includes('/999-') && req.url.endsWith('/') || req.url.includes('index.html')
            );
            
            const listingsContainer = document.getElementById('cached-listings');
            
            if (listingRequests.length === 0) {
              listingsContainer.innerHTML = '<p style="color: var(--text-secondary); font-style: italic;">No cached properties found</p>';
              return;
            }
            
            listingRequests.slice(0, 10).forEach(request => {
              const url = new URL(request.url);
              const pathParts = url.pathname.split('/');
              const listingId = pathParts.find(part => part.startsWith('999-'));
              
              if (listingId) {
                const listingElement = document.createElement('a');
                listingElement.href = `/${listingId}/`;
                listingElement.className = 'cached-item';
                listingElement.innerHTML = `
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9,22 9,12 15,12 15,22"/>
                  </svg>
                  Property ${listingId.replace('999-', '')}
                `;
                listingsContainer.appendChild(listingElement);
              }
            });
          }
        } catch (error) {
          console.error('Failed to load cached listings:', error);
          document.getElementById('cached-content').style.display = 'none';
        }
      } else {
        document.getElementById('cached-content').style.display = 'none';
      }
    }
    
    // Check connection status
    function updateConnectionStatus() {
      if (navigator.onLine) {
        window.location.reload();
      }
    }
    
    // Listen for connection changes
    window.addEventListener('online', updateConnectionStatus);
    
    // Load cached content when page loads
    document.addEventListener('DOMContentLoaded', loadCachedListings);
    
    // Retry button functionality
    document.querySelector('.retry-btn').addEventListener('click', () => {
      if (navigator.onLine) {
        window.location.reload();
      } else {
        // Show a brief message that we're still offline
        const btn = document.querySelector('.retry-btn');
        const originalText = btn.textContent;
        btn.textContent = 'Still Offline...';
        btn.style.background = '#dc2626';
        
        setTimeout(() => {
          btn.textContent = originalText;
          btn.style.background = 'var(--primary)';
        }, 2000);
      }
    });
  </script>
</body>
</html>
