  <!-- Gallery Script - Clean Rebuild -->
  <script>
    class ThunderGallery {
      constructor() {
        this.index = 0;
        this.lang = 'ro' || 'ro';
        this.isAnimating = false;
        this.touchStart = 0;
        this.isDragging = false;
        
        // Load persisted language preference from sessionStorage
        const savedLang = sessionStorage.getItem('thunderGalleryLang');
        if (savedLang) {
          this.lang = savedLang;
        }
        
        // Parse data
        this.cards = JSON.parse(document.getElementById('card-data').textContent);
        this.images = this.cards.filter(c => c.type === 'image');
        this.features = this.cards.find(c => c.type === 'features');
        this.total = this.images.length;
        
        // DOM
        this.gallery = document.getElementById('gallery');
        this.infoOverlay = document.getElementById('infoOverlay');
        this.overlayContent = document.getElementById('overlayContent');
        this.previewModal = document.getElementById('previewModal');
        this.previewImage = document.getElementById('previewImage');
        this.leafletMap = null;
        this.mapInitialized = false;
        
        // Check if essential elements exist
        if (!this.gallery) console.error('Gallery element not found');
        if (!this.infoOverlay) console.error('Info overlay not found');
        
        console.log('DOM elements found:', {
          gallery: !!this.gallery,
          infoOverlay: !!this.infoOverlay,
          overlayContent: !!this.overlayContent
        });
        
        // Set initial overlay reference
        this.overlay = this.infoOverlay;
        
        console.log(`🎯 Gallery: ${this.total} images`);
        this.init();
      }
      
      init() {
        this.renderImages();
        this.renderBubbles();
        this.attachListeners();
        this.setupButtonFunctionality();
        console.log('✅ Gallery ready');
      }
      
      renderImages() {
        // Create a helper function to add image with all listeners
        const addImageToGallery = (card, i, isClone = false) => {
          const img = document.createElement('img');
          img.className = 'gallery-image' + (i === 0 && !isClone ? ' active' : '');
          img.src = card.image;
          img.alt = `Image ${i + 1}`;
          img.style.cursor = 'pointer';
          if (isClone) img.dataset.clone = 'true';
          
          // Single click to open preview
          img.addEventListener('click', (e) => {
            e.preventDefault();
            this.openPreview(card.image);
          });
          
          // Double-tap zoom
          let lastTap = 0;
          img.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            
            if (tapLength < 300 && tapLength > 0) {
              // Double tap detected
              e.preventDefault();
              this.toggleGalleryZoom();
            }
            lastTap = currentTime;
          });
          
          this.gallery.appendChild(img);
        };
        
        // Add clone of last image at the beginning (for smooth left wrap)
        if (this.images.length > 0) {
          addImageToGallery(this.images[this.images.length - 1], this.images.length - 1, true);
        }
        
        // Add all regular images
        this.images.forEach((card, i) => {
          addImageToGallery(card, i, false);
        });
        
        // Add clone of first image at the end (for smooth right wrap)
        if (this.images.length > 0) {
          addImageToGallery(this.images[0], 0, true);
        }
        
        // Adjust initial index to account for prepended clone
        this.index = 1;
        
        // Update overlay with correct initial index
        this.updateOverlay();
      }
      
      toggleGalleryZoom() {
        const activeImg = this.gallery.querySelector('.gallery-image.active');
        if (!activeImg) return;
        
        const currentScale = activeImg.style.transform.match(/scale\(([^)]+)\)/) 
          ? parseFloat(activeImg.style.transform.match(/scale\(([^)]+)\)/)[1]) 
          : 1;
        
        const newScale = currentScale === 1 ? 2 : 1;
        activeImg.style.transition = 'transform 0.3s ease-out';
        activeImg.style.transform = `scale(${newScale})`;
        activeImg.style.transformOrigin = 'center center';
      }
      
      renderBubbles() {
        const bubbles = document.getElementById('bubbles');
        this.images.forEach((_, i) => {
          const bubble = document.createElement('div');
          bubble.className = 'image-bubble' + (i === 0 ? ' active' : '');
          bubbles.appendChild(bubble);
        });
      }
      
      attachListeners() {
        this.gallery.addEventListener('touchstart', (e) => this.onStart(e), { passive: true });
        this.gallery.addEventListener('touchmove', (e) => this.onMove(e), { passive: false });
        this.gallery.addEventListener('touchend', (e) => this.onEnd(e), { passive: true });
        
        // Overlay drag handled below with proper parameters
        
        const closeBtn = document.getElementById('previewClose');
        closeBtn.addEventListener('touchstart', (e) => {
          e.preventDefault();
          this.closePreview();
        }, { passive: false });
        closeBtn.addEventListener('click', (e) => {
          e.preventDefault();
          this.closePreview();
        });
        
        this.previewModal.addEventListener('touchstart', (e) => {
          if (e.target === this.previewModal) this.closePreview();
        }, { passive: true });
        this.previewModal.addEventListener('click', (e) => {
          if (e.target === this.previewModal) this.closePreview();
        });
        
        // Handle overlay dragging for info overlay
        if (this.infoOverlay) {
          this.attachOverlayDrag(this.infoOverlay);
        }
        
        // POI listeners are now initialized in initPOISystem()
        
        // Add window resize listener for dynamic button positioning
        window.addEventListener('resize', () => {
          this.updateButtonPositions();
        }, { passive: true });
        
        // Initial button positioning
        setTimeout(() => {
          this.updateButtonPositions();
        }, 100);
      }
      
      attachOverlayDrag(overlayElement) {
        // Check if overlay element exists
        if (!overlayElement) {
          console.warn('Overlay element is undefined');
          return;
        }
        
        let startY = 0;
        const maxHeight = window.innerHeight * 0.65;
        const handle = overlayElement.querySelector('.overlay-handle');
        
        // Calculate dynamic minimized height based on content up to overlay-section
        const calculateMinHeight = () => {
          const overlayContent = this.overlayContent;
          if (!overlayContent) return 300; // fallback
          
          // Find the overlay-section element
          const overlaySection = overlayContent.querySelector('.overlay-section');
          if (!overlaySection) return 300; // fallback
          
          // Get the position of overlay-section relative to overlay-content
          const contentRect = overlayContent.getBoundingClientRect();
          const sectionRect = overlaySection.getBoundingClientRect();
          
          // Calculate height needed to show everything before overlay-section
          const minHeight = sectionRect.top - contentRect.top + 20; // Add some padding
          
          // Ensure minimum height and reasonable maximum
          return Math.max(200, Math.min(minHeight, 400));
        };
        
        const minHeight = calculateMinHeight();
        
        // Check if handle exists
        if (!handle) {
          console.warn('No overlay handle found for element:', overlayElement);
          return;
        }
        
        // Set initial flex-basis to minHeight (minimized state)
        overlayElement.style.flexBasis = minHeight + 'px';
        
        const updateScrollability = () => {
          const computedStyle = window.getComputedStyle(overlayElement);
          const currentFlexBasis = parseFloat(computedStyle.flexBasis);
          const isFullyExpanded = currentFlexBasis >= maxHeight - 20;
          
          // Get the appropriate content element for this overlay
          const contentElement = this.overlayContent;
          
          if (contentElement) {
            contentElement.style.overflowY = isFullyExpanded ? 'auto' : 'hidden';
          }
          
          // Button visibility is now handled separately in drag events
          // Don't update here to allow more precise control
        };
        
        const handleDragStart = (e) => {
          e.preventDefault();
          startY = e.touches ? e.touches[0].clientY : e.clientY;
          overlayElement.style.transition = 'none';
          this.gallery.classList.add('dragging');
          
          // Hide buttons immediately when dragging starts
          this.updateButtonVisibility(false);
        };
        
        const handleDragMove = (e) => {
          if (startY === 0) return;
          
          e.preventDefault();
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          const diff = startY - clientY;
          const currentHeight = overlayElement.offsetHeight;
          const newHeight = Math.max(minHeight, Math.min(maxHeight, currentHeight + diff));
          
          overlayElement.style.flexBasis = newHeight + 'px';
          updateScrollability();
          startY = clientY;
        };
        
        const handleDragEnd = (e) => {
          if (startY === 0) return;
          
          startY = 0;
          this.gallery.classList.remove('dragging');
          const currentHeight = overlayElement.offsetHeight;
          const midpoint = (minHeight + maxHeight) / 2;
          
          overlayElement.style.transition = 'flex-basis 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
          
          if (currentHeight < midpoint) {
            // Minimized state - show buttons after transition
            overlayElement.style.flexBasis = minHeight + 'px';
            // Smooth scroll to top when minimizing
            const contentElement = this.overlayContent;
            if (contentElement) {
              contentElement.scrollTo({
                top: 0,
                behavior: 'smooth'
              });
            }
            
            // Show buttons after the overlay settles in minimized state
            setTimeout(() => {
              this.updateButtonVisibility(true);
            }, 300);
          } else {
            // Expanded state - keep buttons hidden
            overlayElement.style.flexBasis = maxHeight + 'px';
            this.updateButtonVisibility(false);
          }
          
          setTimeout(() => {
            updateScrollability();
          }, 300);
        };
        
        // Touch events - attach to handle for better touch handling
        handle.addEventListener('touchstart', handleDragStart, { passive: false });
        document.addEventListener('touchmove', handleDragMove, { passive: false });
        document.addEventListener('touchend', handleDragEnd, false);
        
        // Mouse events (for desktop testing) - attach to handle
        handle.addEventListener('mousedown', handleDragStart, false);
        document.addEventListener('mousemove', handleDragMove, { passive: false });
        document.addEventListener('mouseup', handleDragEnd, false);
        
        // Initial state
        updateScrollability();
        
        // Show buttons initially since overlay starts minimized
        setTimeout(() => {
          this.updateButtonVisibility(true);
        }, 100);
      }
      
      onStart(e) {
        if (this.isAnimating) return;
        this.touchStart = e.touches[0].clientX;
        this.isDragging = true;
        this.gallery.querySelectorAll('.gallery-image').forEach(img => {
          img.style.transition = 'none';
        });
      }
      
      onMove(e) {
        if (!this.isDragging) return;
        e.preventDefault();
        
        const diff = e.touches[0].clientX - this.touchStart;
        const percent = (diff / this.gallery.offsetWidth) * 100;
        
        this.gallery.querySelectorAll('.gallery-image').forEach((img, i) => {
          const offset = (i - this.index) * 100;
          img.style.transform = `translateX(${offset + percent}%)`;
        });
      }
      
      onEnd(e) {
        if (!this.isDragging) return;
        this.isDragging = false;
        
        const diff = e.changedTouches[0].clientX - this.touchStart;
        const threshold = this.gallery.offsetWidth * 0.2;
        
        // With clones: index 0 is last image clone, 1 to total is real images, total+1 is first image clone
        if (diff > threshold) {
          // Swiping right (previous image)
          this.index--;
        } else if (diff < -threshold) {
          // Swiping left (next image)
          this.index++;
        }
        
        this.animate();
      }
      
      animate() {
        this.isAnimating = true;
        this.gallery.querySelectorAll('.gallery-image').forEach(img => {
          img.style.transition = 'transform 0.2s linear';
        });
        
        this.gallery.querySelectorAll('.gallery-image').forEach((img, i) => {
          img.style.transform = `translateX(${(i - this.index) * 100}%)`;
        });
        
        setTimeout(() => {
          this.handleWrap();
          this.update();
          this.isAnimating = false;
        }, 200);
      }
      
      handleWrap() {
        const totalWithClones = this.total + 2; // clone_last + real_images + clone_first
        
        // If we're at or past the last clone (first image), jump to real first image
        if (this.index >= totalWithClones - 1) {
          this.index = 1;
          this.gallery.querySelectorAll('.gallery-image').forEach(img => {
            img.style.transition = 'none';
          });
          this.gallery.querySelectorAll('.gallery-image').forEach((img, i) => {
            img.style.transform = `translateX(${(i - this.index) * 100}%)`;
          });
        }
        // If we're at or before the first clone (last image), jump to real last image
        else if (this.index <= 0) {
          this.index = this.total;
          this.gallery.querySelectorAll('.gallery-image').forEach(img => {
            img.style.transition = 'none';
          });
          this.gallery.querySelectorAll('.gallery-image').forEach((img, i) => {
            img.style.transform = `translateX(${(i - this.index) * 100}%)`;
          });
        }
      }
      
      update() {
        // Images - adjust for clone at beginning
        this.gallery.querySelectorAll('.gallery-image').forEach((img, i) => {
          const realIndex = i === 0 ? this.total : (i === this.total + 1 ? 0 : i - 1);
          img.classList.toggle('active', i === this.index);
        });
        
        // Bubbles - only update for real images (skip clones)
        const bubbles = document.querySelectorAll('.image-bubble');
        bubbles.forEach((b, i) => {
          // Map bubble index to image index (accounting for clone at position 0)
          b.classList.toggle('active', i === this.index - 1);
        });
        
        this.updateOverlay();
      }
      
      goTo(i) {
        if (i === this.index || this.isAnimating) return;
        this.index = i;
        this.animate();
      }

              startY = e.clientY;

            });
            
            gallery.addEventListener('mouseup', (e) => {
              if (isDragging) {
                const endX = e.clientX;
                const endY = e.clientY;
                const deltaX = Math.abs(endX - startX);
                const deltaY = Math.abs(endY - startY);
                
                // Check if it's a horizontal swipe (more horizontal than vertical)
                if (deltaX > 50 && deltaX > deltaY * 2) {
                  // Hide only toggles on swipe, keep other buttons visible
                  this.hideToggleContainers();
                  togglesVisible = false;

                togglesVisible = false;

        const finalBottom = (window.innerHeight - handleTop) + spacingFromHandle;

      handleShareAction() {
        // Get the actual listing URL from Open Graph meta tag
        const ogUrlMeta = document.querySelector('meta[property="og:url"]');
        const actualUrl = ogUrlMeta ? ogUrlMeta.getAttribute('content') : window.location.href;
        
        console.log('🏠 Current window location:', window.location.href);
        console.log('📋 Open Graph URL from meta tag:', ogUrlMeta ? ogUrlMeta.getAttribute('content') : 'Not found');
        
        // Share URL only - Open Graph tags will handle the preview
        try {
          if (navigator.share) {
            const shareData = {
              url: actualUrl
            };
            
            try {
              if (navigator.canShare(shareData)) {
                navigator.share(shareData);
                console.log('✅ SUCCESS: URL shared (Open Graph will generate preview)');
                return;
              }
            } catch (err) {
              if (err.name === 'AbortError') {
                console.log('Share cancelled by user');
                return;
              }

      attachPreviewZoom() {
        let initialDistance = 0;
        let currentScale = 1;
        const minScale = 1;
        const maxScale = 3;
        let isZooming = false;
        
        const getDistance = (touches) => {
          if (touches.length < 2) return 0;
          const dx = touches[0].clientX - touches[1].clientX;
          const dy = touches[0].clientY - touches[1].clientY;
          return Math.sqrt(dx * dx + dy * dy);
        };
        
        const handleTouchStart = (e) => {
          if (e.touches.length === 2) {
            e.preventDefault();
            isZooming = true;
            initialDistance = getDistance(e.touches);
            this.previewImage.style.transition = 'none';
          }
        };
        
        const handleTouchMove = (e) => {
          if (!isZooming || e.touches.length !== 2) return;
          
          e.preventDefault();
          const currentDistance = getDistance(e.touches);
          
          if (initialDistance === 0) {
            initialDistance = currentDistance;
            return;
          }
          
          const scale = (currentDistance / initialDistance) * currentScale;
          
          if (scale < minScale) {
            this.closePreview();
            isZooming = false;
            return;
          }
          
          const newScale = Math.min(maxScale, Math.max(minScale, scale));
          this.previewImage.style.transform = `scale(${newScale})`;
        };
        
        const handleTouchEnd = (e) => {
          if (!isZooming) return;
          
          isZooming = false;
          const match = this.previewImage.style.transform.match(/scale\(([^)]+)\)/);
          currentScale = match ? parseFloat(match[1]) : 1;
          
          // Reset transition for smooth scaling
          this.previewImage.style.transition = 'transform 0.1s ease-out';
        };
        
        this.previewContainer = this.previewContainer || document.querySelector('.preview-container');
        this.previewContainer.addEventListener('touchstart', handleTouchStart, { passive: false });
        this.previewContainer.addEventListener('touchmove', handleTouchMove, { passive: false });
        this.previewContainer.addEventListener('touchend', handleTouchEnd, { passive: true });
        this.previewContainer.addEventListener('touchcancel', handleTouchEnd, { passive: false });
      }
      
      closePreview() {
        this.previewModal.classList.remove('active');
      }

        if (mapDataElement) {

      // Luna-style spacing offset function
      applySpacingOffset(lat, lng, poiType) {
        const gridX = Math.floor(lng / this.GRID_SIZE);
        const gridY = Math.floor(lat / this.GRID_SIZE);
        const gridKey = `${gridX},${gridY}`;
        
        if (!this.spacingGrid.has(gridKey)) {
          this.spacingGrid.set(gridKey, []);
        }
        
        const existingPins = this.spacingGrid.get(gridKey);
        const offset = existingPins.length;
        
        // Apply small offset in a spiral pattern
        const angle = (offset * 60) * (Math.PI / 180); // 60 degrees apart
        const distance = (offset + 1) * 0.00005; // ~5 meters per step
        
        const offsetLat = lat + (distance * Math.cos(angle));
        const offsetLng = lng + (distance * Math.sin(angle));
        
        existingPins.push({ lat: offsetLat, lng: offsetLng, type: poiType });
        
        return { lat: offsetLat, lng: offsetLng };
      }
      
      initPOIListeners() {
        // Remove existing POI listener to prevent duplicates
        if (this.poiListenerHandler) {
          document.removeEventListener('click', this.poiListenerHandler);
        }
        
        // POI button listeners (Luna-style) - store handler for removal
        this.poiListenerHandler = (e) => {
          if (e.target.closest('.poi-btn')) {
            const button = e.target.closest('.poi-btn');
            const parent = button.dataset.parent;
            
            // If clicking the same active category, deactivate it
            if (this.activePOICategory === parent) {
              this.deactivateAllPOIs();
              this.activePOICategory = null;
              return;
            }
            
            // Deactivate all POI categories first
            this.deactivateAllPOIs();
            
            // Set new active category
            this.activePOICategory = parent;
            
            // Find all POI types for this parent category
            const poiTypes = Object.entries(this.poiCategories)
              .filter(([key, config]) => config.parent === parent)
              .map(([key]) => key);
            
            // Activate the clicked POI type
            this.activatePoiType(parent, button);
          }
        };
        
        document.addEventListener('click', this.poiListenerHandler);
      }
      
      activatePoiType(poiType, button) {
        // Check if this category is already active to prevent blinking
        if (this.activePOICategory === poiType && button.classList.contains('active')) {
          return; // Already active, no need to re-activate
        }
        
        button.classList.add('active');
        
        // Find all POI types for this parent category
        const poiTypeKeys = Object.entries(this.poiCategories)
          .filter(([key, config]) => config.parent === poiType)
          .map(([key]) => key);
        
        // Check if POI data already exists
        const hasExistingData = poiTypeKeys.some(key => this.poiLayers[key]);
        
        if (!hasExistingData) {
          // Only show loading state if we need to fetch new data
          const originalText = button.innerHTML;
          button.innerHTML = 'Loading...';
          
          // Load POIs for this category
          this.loadPOIs(poiType).then(() => {
            // Restore button text only if still active
            if (this.activePOICategory === poiType) {
              button.innerHTML = originalText;
            }
          }).catch(error => {
            console.error('Error loading POIs:', error);
            button.innerHTML = 'Error';
            setTimeout(() => {
              button.classList.remove('active');
              button.innerHTML = originalText;
            }, 1500);
          });
        } else {
          // Show existing POI layers with safety checks
          poiTypeKeys.forEach(key => {
            if (this.poiLayers[key] && this.leafletMap) {
              try {
                if (!this.leafletMap.hasLayer(this.poiLayers[key])) {
                  this.leafletMap.addLayer(this.poiLayers[key]);
                }
              } catch (error) {
                console.warn('Failed to add POI layer:', key, error);
              }
            }
          });
        }
      }
      
      deactivateAllPOIs() {
        // Remove active state from all POI buttons
        document.querySelectorAll('.poi-btn').forEach(btn => {
          btn.classList.remove('active');
        });
        
        // Remove all POI layers from map with safety checks
        Object.keys(this.poiLayers).forEach(layerKey => {
          if (this.poiLayers[layerKey] && this.leafletMap) {
            try {
              if (this.leafletMap.hasLayer(this.poiLayers[layerKey])) {
                this.leafletMap.removeLayer(this.poiLayers[layerKey]);
              }
            } catch (error) {
              console.warn('Failed to remove POI layer:', layerKey, error);
            }
          }
        });
      }
      
      async loadPOIs(poiType) {
        if (!window.preGeneratedPOIData) {
          console.warn('No POI data available');
          return;
        }
        
        console.log('Loading POIs for category:', poiType);
        
        // Find all POI types for this parent category
        const poiTypes = Object.entries(this.poiCategories)
          .filter(([key, config]) => config.parent === poiType)
          .map(([key]) => key);
        
        console.log('POI types for category', poiType, ':', poiTypes);
        
        // Load all POI types for this category
        for (const singlePoiType of poiTypes) {
          // Get POI data for this category from pre-generated data
          const categoryData = window.preGeneratedPOIData[singlePoiType] || [];
          
          console.log('Found POIs for', singlePoiType, ':', categoryData.length);
          
          if (categoryData.length === 0) continue;
          
          // Debug: Show first POI data structure
          if (categoryData.length > 0) {
            console.log('Sample POI data for', singlePoiType, ':', categoryData[0]);
          }
          
          // Create layer for this POI type
          this.poiLayers[singlePoiType] = L.layerGroup();
          
          // Add markers to layer
          categoryData.forEach(poi => {
            const marker = this.createPOIMarker(poi, singlePoiType);
            if (marker) {
              this.poiLayers[singlePoiType].addLayer(marker);
            }
          });
          
          // Add layer to map
          this.leafletMap.addLayer(this.poiLayers[singlePoiType]);
        }
        
        console.log('POI layers created:', Object.keys(this.poiLayers));
      }
      
      // Luna-style POI marker creation function
      createPOIMarker(poi, poiType) {
        const lat = poi.lat || (poi.center?.lat);
        const lng = poi.lng || (poi.center?.lon) || (poi.center?.lng);
        
        if (!lat || !lng) return null;
        
        const name = poi.name || poi.tags?.name || 'Unnamed';
        const category = poi.category || poi.tags?.amenity || poi.tags?.shop || 'other';
        const operator = poi.operator || poi.tags?.operator || '';
        const opening_hours = poi.opening_hours || poi.tags?.opening_hours || '';
        const phone = poi.phone || poi.tags?.phone || '';
        const website = poi.website || poi.tags?.website || '';
        
        // Get marker style for this POI type (Luna-style)
        const baseType = this.poiCategories[poiType]?.parent || poiType;
        console.log('POI type:', poiType, 'Base type:', baseType);
        const markerStyle = this.poiMarkers[baseType] || this.poiMarkers.schools;
        console.log('Marker style for', baseType, ':', markerStyle ? 'found' : 'NOT FOUND, using schools fallback');
        
        // Apply spacing offset to prevent overlap
        const adjustedPosition = this.applySpacingOffset(lat, lng, poiType);
        
        // Create professional pin marker (Luna-style)
        const pinMarker = L.marker([adjustedPosition.lat, adjustedPosition.lng], {
          icon: L.divIcon({
            className: 'poi-pin-marker',
            html: `<div role="img" aria-label="${name} - ${this.poiCategories[poiType]?.name || category}">${markerStyle.svg}</div>`,
            iconSize: [50, 60],
            iconAnchor: [25, 55],
            popupAnchor: [0, -55]
          }),
          alt: `${name} - ${this.poiCategories[poiType]?.name || category}`,
          title: name
        });
        
        // Calculate distance from property
        const distance = Math.round(
          this.leafletMap.distance([this.mapData.lat, this.mapData.lng], [lat, lng])
        );

        // Build rich popup content (Luna-style)
        let popupContent = `<div class="poi-popup">
          <strong>${name}</strong><br>
          <em>${this.poiCategories[poiType]?.name || category}</em><br>
          <small>📍 ${distance}m away</small>`;

        if (operator) {
          popupContent += `<br><small>🏢 ${operator}</small>`;
        }
        if (opening_hours) {
          popupContent += `<br><small>🕐 ${opening_hours}</small>`;
        }
        if (phone) {
          popupContent += `<br><small>📞 <a href="tel:${phone}">${phone}</a></small>`;
        }
        if (website) {
          const displayUrl = website.replace(/^https?:\/\//, '').substring(0, 30);
          popupContent += `<br><small>🌐 <a href="${website}" target="_blank">${displayUrl}</a></small>`;
        }
        popupContent += '</div>';

        // Bind popup once during creation (not on each click)
        pinMarker.bindPopup(popupContent);
        
        // Store accessibility data for batch processing
        pinMarker._accessibilityData = {
          ariaLabel: `${name} - ${this.poiCategories[poiType]?.name || category} - ${distance}m away`,
          title: name
        };
        
        return pinMarker;
      }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      const gallery = new ThunderGallery();
    });
  </script>
</body>
